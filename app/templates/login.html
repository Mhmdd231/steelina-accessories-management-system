{% extends "base.html" %}

{% block title %}
Login - Steelina
{% endblock %}

{% block content %}

<section class="form-section">
    <form method="POST" class="form-box">

        <h2>Login</h2>

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">Login</button>

        <p>
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">Register</a>
        </p>

    </form>
</section>

{% endblock %}
