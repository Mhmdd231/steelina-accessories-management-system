{% extends "base.html" %}

{% block title %}
Register - Steelina
{% endblock %}

{% block content %}

<section class="form-section">

    <form method="POST" class="form-box">

        <h2>Create Account</h2>

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

        <p>
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login</a>
        </p>

    </form>

</section>

{% endblock %}
