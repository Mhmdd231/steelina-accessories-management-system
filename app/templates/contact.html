{% extends "base.html" %}

{% block title %}
Contact - Steelina
{% endblock %}

{% block content %}

<section class="form-section">

    <form method="POST" class="form-box">

        <h2>Contact Us</h2>

        {% if success %}
            <p class="success-msg">
                Thank you {{ name }}! Your message was sent successfully.
            </p>
        {% endif %}

        <input
            type="text"
            name="name"
            placeholder="Your Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Your Email"
            required
        >

        <textarea
            name="message"
            placeholder="Your Message"
            required></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</section>

{% endblock %}
